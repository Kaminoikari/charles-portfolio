        <h2>Frequently Asked Questions</h2>

        <h3>What is an AI Product Builder?</h3>
        <p>An AI Product Builder is a product manager who builds, not just plans. They use AI coding tools like Claude Code and Cursor to prototype and ship products in days instead of weeks. They combine product strategy (JTBD, RICE) with hands-on AI/LLM development to deliver end-to-end.</p>

        <h3>How to become an AI Product Builder?</h3>
        <p>Start with product strategy fundamentals — learn JTBD, RICE prioritization, and PRD writing. Then pick up AI coding tools like Claude Code or Cursor to build real prototypes. Ship side projects that use LLMs or generative AI. Build an AI product portfolio showing measurable impact. The key differentiator is shipping real AI SaaS products, not just managing them.</p>

        <h3>What does an AI product manager portfolio look like?</h3>
        <p>A strong AI product manager portfolio shows real products you shipped, with metrics. Include AI SaaS products, LLM-powered tools, or AI agent projects. Show user impact numbers, revenue driven, and velocity improvements. Explain your product thinking and why you made specific decisions — not just the technology stack.</p>

        <h3>What's the difference between an AI Product Manager and an AI Product Builder?</h3>
        <p>An AI Product Manager focuses on strategy, roadmap, and stakeholder alignment for AI-powered products. An AI Product Builder goes further — they also prototype and ship the product using AI coding tools. Charles Chen operates as both: defining product strategy as an AI Product Manager while building working products as an AI Product Builder.</p>

        <h3>What are examples of generative AI products?</h3>
        <p>Generative AI product examples include AI spec generators (Product Playbook), AI stock analysis with LLM diagnostics (Plutus Trade), AI travel planners (Path), and AI agent tools for developer workflows. These products use generative AI to automate complex tasks that previously required manual work.</p>
