name: Chat Insights

# Manually triggered chat-analytics report against the live Qdrant chat_logs
# collection. Renders both the HTML BI dashboard (rag/insights/dashboard.ts,
# donut PNGs included) and the plain-text report (rag/insights/report.ts).
#
# Why a workflow and not a local run: like rag-eval.yml, the report needs
# outbound access to Qdrant plus the QDRANT_* secrets, which only this runner
# has. Outputs are uploaded as an artifact; on push-triggered runs they are
# also committed back to the triggering branch under .insights-out/ so callers
# whose network can reach github.com but not the artifact CDN (e.g. an agent
# session behind an allowlist proxy) can fetch them with plain git.
#
# Required repo secrets: QDRANT_URL · QDRANT_API_KEY

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/ref to check out and run (defaults to main)'
        type: string
        default: main
  # workflow_dispatch only registers once the file lands on the default branch;
  # the push trigger below lets the report run from a feature branch too.
  push:
    branches:
      - 'claude/chat-insight-*'
    paths:
      - '.github/workflows/chat-insights.yml'

# contents: write only so push-triggered runs can commit .insights-out/ back
# to their own branch; the job otherwise just reads the checkout and Qdrant.
permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate HTML dashboard + text report
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: |
          mkdir -p out
          npx tsx rag/insights/dashboard.ts --assets out > out/chat-insights.html
          npx tsx rag/insights/report.ts > out/chat-insights.txt

      - name: Commit outputs back to the triggering branch (push runs only)
        if: github.event_name == 'push'
        run: |
          rm -rf .insights-out
          mkdir .insights-out
          cp out/* .insights-out/
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .insights-out
          git commit -m 'chore(insights): CI-generated chat-insights output [skip ci]' || exit 0
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: chat-insights
          path: out/
