name: RAG Ingest

# Manually triggered from the Actions tab. Builds the vector index: extracts the
# corpus, embeds dense vectors with Voyage, and upserts into Qdrant (which
# computes the BM25 sparse vector server-side via Cloud Inference).
#
# Why a workflow and not a local run: the index needs outbound access to the
# Voyage and Qdrant APIs plus the three secrets below — this runner has both.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   QDRANT_URL         e.g. https://<id>.us-east-1-1.aws.cloud.qdrant.io
#   QDRANT_API_KEY     the cluster API key
#   VOYAGE_API_KEY     Voyage AI key (dense embeddings + rerank)

on:
  # Auto-run on every push to main that touches a content source, so the vector
  # index and FAQ cache can never drift behind the site. Paths cover everything
  # the corpus is built from (rag/ingest/extract.ts) plus the hand-written FAQ
  # cache and the entity/map context. Add new content globs here when a new
  # source file type is introduced.
  push:
    branches: [main]
    paths:
      - 'src/data/projects.*.ts'
      - 'src/data/aboutContent.*.ts'
      - 'src/data/experience.*.ts'
      - 'src/data/skills.*.ts'
      - 'src/data/changelog.*.ts'
      - 'src/data/blog.*.ts'
      - 'src/data/agentPatterns.*.ts'
      - 'rag/faq-cache.ts'
      - 'rag/portfolio-map.ts'
      - 'rag/entities/**'
      - 'rag/ingest/**'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/ref to check out and run (defaults to main, where the RAG code lives)'
        type: string
        default: main
      dry_run:
        description: 'Dry run (extract + report counts, no embeddings, no writes)'
        type: boolean
        default: false
      collection:
        description: 'Qdrant collection to write (defaults to the production doc_chunks)'
        type: string
        default: doc_chunks
      blog_body:
        description: 'Index blog full-text body chunks (set false for a titles-only baseline)'
        type: string
        default: 'true'
      contextual:
        description: 'Contextual retrieval on fragment chunks (Anthropic-style; needs ANTHROPIC_API_KEY)'
        type: boolean
        default: false
      prune:
        description: 'Allow deleting stale points above RAG_PRUNE_MAX (one-time orphan cleanup)'
        type: boolean
        default: false

# One ingest at a time. A newer push supersedes an in-flight run so the index
# always settles on the latest content instead of racing two upserts into Qdrant.
concurrency:
  group: rag-ingest
  cancel-in-progress: true

# Needed so the job can commit the refreshed blog-bodies cache back. Pushes made
# with GITHUB_TOKEN do not themselves trigger another workflow run, so this can
# never loop (the [skip ci] in the commit message is a second guard).
permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # workflow_dispatch passes an explicit ref; a push has no input, so fall
          # back to the pushed commit (github.ref) instead of the stale default.
          ref: ${{ inputs.ref || github.ref }}
          # Don't leave the contents:write token in .git/config for the whole job:
          # npm ci (postinstall scripts) and rag:blog (third-party Substack fetch)
          # run before the push and would otherwise be able to read it and push to
          # main. The final push step re-authenticates explicitly instead.
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch new blog bodies
        if: ${{ inputs.dry_run != true }}
        # Top up blog-bodies.json with any newly added articles so their full text
        # is indexed automatically on the same push that adds the article. Only
        # missing URLs are fetched (cached ones are skipped), and a flaky
        # third-party fetch must never block the index — failures are non-fatal,
        # so those articles fall back to the title+subtitle chunk until next run.
        run: npm run rag:blog || echo "::warning::some blog fetches failed; indexing with cached bodies"

      - name: Build index
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          # Only used when contextual retrieval is on; harmless otherwise.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          QDRANT_COLLECTION: ${{ inputs.collection || 'doc_chunks' }}
          RAG_BLOG_BODY: ${{ inputs.blog_body || 'true' }}
          # Boolean inputs → the '1' our config readers expect; empty on a push
          # event, so an auto-triggered content ingest stays contextual-off and
          # prune-guarded.
          RAG_CONTEXTUAL: ${{ inputs.contextual && '1' || '' }}
          RAG_PRUNE: ${{ inputs.prune && '1' || '' }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm run rag:ingest:dry
          else
            npm run rag:ingest
          fi

      - name: Build FAQ semantic cache
        # Skip for experiment collections so an A/B ingest never rewrites prod FAQ.
        if: ${{ (inputs.collection || 'doc_chunks') == 'doc_chunks' }}
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm run rag:faq:dry
          else
            npm run rag:faq
          fi

      - name: Persist refreshed blog cache
        if: ${{ inputs.dry_run != true }}
        # Commit the topped-up cache back so blog-bodies.json stays the complete,
        # reproducible source of truth and the same body is never refetched twice.
        run: |
          if git diff --quiet -- rag/ingest/blog-bodies.json; then
            echo "blog cache unchanged — nothing to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add rag/ingest/blog-bodies.json
            git commit -m "chore(rag): refresh blog-bodies cache [skip ci]"
            # Explicit token auth (checkout ran with persist-credentials: false).
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" "HEAD:${{ inputs.ref || github.ref_name }}"
          fi
