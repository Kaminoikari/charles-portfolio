name: RAG Eval

# Manually triggered eval against the live Qdrant index. Runs the golden set
# through the retrieval arms (dense-only → hybrid → hybrid+rerank) for
# recall@k / MRR / Δrecall, plus the corrective arm: the full graph that
# generates an answer and scores it with the faithfulness judge. Results print
# to the job log.
#
# Why a workflow and not a local run: eval needs outbound access to Voyage,
# Qdrant, Anthropic and Gemini plus the secrets below. This runner has them; a
# local checkout does not, because the Vercel-side keys are Encrypted and cannot
# be pulled back to a developer machine.
#
# Required repo secrets:
#   QDRANT_URL · QDRANT_API_KEY · VOYAGE_API_KEY   → retrieval arms
#   ANTHROPIC_API_KEY · GEMINI_API_KEY             → corrective arm + faithfulness judge
# With the last two absent, the corrective arm self-skips and only the retrieval
# arms run (run-eval.ts drops it when ANTHROPIC_API_KEY is unset).

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/ref to check out and run (defaults to main)'
        type: string
        default: main
      collection:
        description: 'Qdrant collection to evaluate (defaults to the production doc_chunks)'
        type: string
        default: doc_chunks
      arm:
        description: 'Single arm to run (blank = all arms). e.g. corrective'
        type: string
        default: ''
      locale:
        description: 'Single locale to run (blank = all: en, zh-TW, ja). e.g. en'
        type: string
        default: ''

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run eval (retrieval arms + corrective / faithfulness)
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Run grade/rewrite/generate on Claude so the suite is never throttled
          # by Gemini's free-tier 5-req/min quota. EVAL-ONLY; production keeps the
          # Gemini-first cost cascade (this flag stays unset there).
          RAG_FORCE_CLAUDE: '1'
          QDRANT_COLLECTION: ${{ inputs.collection || 'doc_chunks' }}
          # Inputs passed via env (not interpolated into the script) to avoid
          # shell injection from workflow_dispatch fields.
          ARM: ${{ inputs.arm }}
          LOCALE: ${{ inputs.locale }}
        run: |
          ARGS=""
          [ -n "$ARM" ] && ARGS="$ARGS --arm $ARM"
          [ -n "$LOCALE" ] && ARGS="$ARGS --locale $LOCALE"
          echo "running: npm run rag:eval -- $ARGS"
          npm run rag:eval -- $ARGS
