<svg xmlns="http://www.w3.org/2000/svg" width="560" height="430" viewBox="0 0 560 430" font-family="'Space Grotesk',Arial,sans-serif">
  <defs>
    <linearGradient id="ai" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8652B"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>
    <radialGradient id="g" cx="15%" cy="10%" r="60%">
      <stop offset="0%" stop-color="#E8652B" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="560" height="430" fill="#0A0A0A"/>
  <rect width="560" height="430" fill="url(#g)"/>

  <text x="40" y="40" fill="#999" font-size="12" letter-spacing="1.5" font-family="'SF Mono',monospace">LAUNCHER VARIANTS — pick one</text>

  <!-- Variant 1: sparkle gradient -->
  <text x="40" y="78" fill="#666" font-size="11" font-family="'SF Mono',monospace">1 — GRADIENT SPARKLE</text>
  <rect x="40" y="90" width="270" height="50" rx="25" fill="#111111" stroke="#1f2228"/>
  <path d="M 66 106 L 70 114 L 78 115 L 70 116 L 66 124 L 62 116 L 54 115 L 62 114 Z" fill="url(#ai)"/>
  <text x="90" y="120" fill="#fff" font-size="14.5">Ask about Charles</text>
  <text x="40" y="158" fill="#666" font-size="10.5">AI sparkle ✦ = universal "intelligent" cue (Notion/Linear style)</text>

  <!-- Variant 2: live status -->
  <text x="40" y="196" fill="#666" font-size="11" font-family="'SF Mono',monospace">2 — LIVE STATUS DOT</text>
  <rect x="40" y="208" width="290" height="50" rx="25" fill="#111111" stroke="#1f2228"/>
  <circle cx="66" cy="233" r="5" fill="#E8652B"/>
  <circle cx="66" cy="233" r="10" fill="#E8652B" opacity="0.22"/>
  <text x="86" y="238" fill="#fff" font-size="14.5">Ask about Charles</text>
  <text x="250" y="237" fill="#00D9FF" font-size="10.5" font-family="'SF Mono',monospace">● live</text>
  <text x="40" y="276" fill="#666" font-size="10.5">Pulsing dot + "live" = a real agent answering now, not a form</text>

  <!-- Variant 3: verb "Ask AI" -->
  <text x="40" y="314" fill="#666" font-size="11" font-family="'SF Mono',monospace">3 — AI VERB + AVATAR ORB</text>
  <rect x="40" y="326" width="250" height="50" rx="25" fill="#111111" stroke="#1f2228"/>
  <circle cx="68" cy="351" r="11" fill="none" stroke="url(#ai)" stroke-width="2"/>
  <circle cx="68" cy="351" r="4" fill="url(#ai)"/>
  <text x="92" y="356" fill="#fff" font-size="14.5">Ask Charles's AI</text>
  <text x="40" y="394" fill="#666" font-size="10.5">Orb avatar + names it "AI" outright — most explicit</text>

  <!-- Variant 4: typing shimmer -->
  <text x="330" y="196" fill="#666" font-size="11" font-family="'SF Mono',monospace">4 — THINKING DOTS</text>
  <rect x="330" y="208" width="190" height="50" rx="25" fill="#111111" stroke="#1f2228"/>
  <text x="352" y="238" fill="#fff" font-size="14.5">Ask about Charles</text>
  <circle cx="486" cy="233" r="3" fill="#666"/>
  <circle cx="496" cy="233" r="3" fill="#999"/>
  <circle cx="506" cy="233" r="3" fill="#00D9FF"/>
  <text x="330" y="276" fill="#666" font-size="10.5">Animated typing dots = "it's thinking"</text>
</svg>
