<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" font-family="'Space Grotesk',Arial,sans-serif">
  <defs>
    <radialGradient id="bgglow" cx="18%" cy="8%" r="55%">
      <stop offset="0%" stop-color="#E8652B" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- canvas -->
  <rect width="1180" height="640" fill="#0A0A0A"/>
  <rect width="1180" height="640" fill="url(#bgglow)"/>

  <!-- ===================== LEFT: launcher + empty state ===================== -->
  <text x="40" y="44" fill="#999" font-size="13" letter-spacing="1.5" font-family="'SF Mono',monospace">STATE A — CLOSED LAUNCHER</text>

  <!-- launcher pill -->
  <rect x="40" y="64" width="244" height="48" rx="24" fill="#111111" stroke="#1f2228"/>
  <circle cx="66" cy="88" r="5" fill="#E8652B"/>
  <circle cx="66" cy="88" r="9" fill="#E8652B" opacity="0.25"/>
  <text x="84" y="93" fill="#fff" font-size="14">Ask about Charles</text>
  <text x="248" y="92" fill="#666" font-size="11" font-family="'SF Mono',monospace">RAG ↵</text>

  <text x="40" y="168" fill="#999" font-size="13" letter-spacing="1.5" font-family="'SF Mono',monospace">STATE C — EMPTY (SUGGESTED)</text>

  <!-- empty-state mini panel -->
  <rect x="40" y="188" width="360" height="360" rx="16" fill="#111111" stroke="#1f2228" filter="url(#shadow)"/>
  <line x1="40" y1="236" x2="400" y2="236" stroke="#1f2228"/>
  <circle cx="64" cy="212" r="5" fill="#E8652B"/>
  <text x="80" y="210" fill="#fff" font-size="14" font-weight="600">Ask about Charles</text>
  <text x="80" y="226" fill="#666" font-size="9.5" letter-spacing="0.5" font-family="'SF Mono',monospace">AGENTIC RAG · VOYAGE-3 · CLAUDE</text>
  <text x="426" y="216" fill="#666" font-size="15">✕</text>

  <text x="64" y="270" fill="#999" font-size="12.5">Ask me anything about Charles's projects,</text>
  <text x="64" y="289" fill="#999" font-size="12.5">experience, or how he builds with AI.</text>
  <text x="64" y="308" fill="#666" font-size="12">Answers are grounded — I'll say if something</text>
  <text x="64" y="325" fill="#666" font-size="12">isn't covered.</text>

  <!-- chips -->
  <rect x="64" y="346" width="210" height="30" rx="15" fill="none" stroke="#1f2228"/>
  <text x="78" y="365" fill="#999" font-size="12">What did he do at USPACE?</text>
  <rect x="64" y="384" width="190" height="30" rx="15" fill="none" stroke="#1f2228"/>
  <text x="78" y="403" fill="#999" font-size="12">他整體的產品風格是什麼?</text>
  <rect x="64" y="422" width="170" height="30" rx="15" fill="none" stroke="#1f2228"/>
  <text x="78" y="441" fill="#999" font-size="12">Tell me about Plutus Trade</text>

  <!-- composer -->
  <line x1="40" y1="500" x2="400" y2="500" stroke="#1f2228"/>
  <rect x="64" y="514" width="250" height="20" rx="10" fill="#0A0A0A" stroke="#1f2228"/>
  <text x="74" y="528" fill="#666" font-size="11">Ask anything about his work…</text>
  <rect x="326" y="510" width="52" height="28" rx="9" fill="#E8652B"/>
  <text x="338" y="529" fill="#fff" font-size="12" font-weight="600">Send</text>

  <!-- ===================== RIGHT: open panel, streaming + transparency ===================== -->
  <text x="448" y="44" fill="#999" font-size="13" letter-spacing="1.5" font-family="'SF Mono',monospace">STATE B — OPEN · STREAMING ANSWER + RETRIEVAL TRANSPARENCY</text>

  <rect x="448" y="64" width="690" height="540" rx="16" fill="#111111" stroke="#1f2228" filter="url(#shadow)"/>

  <!-- header -->
  <line x1="448" y1="116" x2="1138" y2="116" stroke="#1f2228"/>
  <circle cx="474" cy="92" r="5" fill="#E8652B"/>
  <circle cx="474" cy="92" r="9" fill="#E8652B" opacity="0.25"/>
  <text x="490" y="89" fill="#fff" font-size="15" font-weight="600">Ask about Charles</text>
  <text x="490" y="105" fill="#666" font-size="9.5" letter-spacing="0.5" font-family="'SF Mono',monospace">AGENTIC RAG · VOYAGE-3 · CLAUDE</text>
  <text x="1112" y="96" fill="#666" font-size="16">✕</text>

  <!-- user bubble -->
  <rect x="788" y="140" width="326" height="38" rx="14" fill="#1A1A1A" stroke="#1f2228"/>
  <text x="806" y="164" fill="#fff" font-size="13.5">What did Charles do at USPACE?</text>

  <!-- corrective loop indicator -->
  <circle cx="478" cy="206" r="4" fill="#00D9FF"/>
  <text x="492" y="210" fill="#666" font-size="11.5" font-family="'SF Mono',monospace">retrieving → grading → answering</text>

  <!-- bot answer (streaming, with caret) -->
  <text x="474" y="246" fill="#fff" font-size="13.5">At USPACE, Charles is a <tspan fill="#fff" font-weight="700">Product Manager</tspan> owning three</text>
  <text x="474" y="268" fill="#fff" font-size="13.5">product lines — parking payments, business travel, and</text>
  <text x="474" y="290" fill="#fff" font-size="13.5">financial insurance — across TW &amp; JP, contributing 85%+</text>
  <text x="474" y="312" fill="#fff" font-size="13.5">of revenue <tspan fill="#00D9FF" font-family="'SF Mono',monospace" font-size="12">[1]</tspan>. He also launched USPACE for Business,</text>
  <text x="474" y="334" fill="#fff" font-size="13.5">a B2B SaaS, from 0→1 <tspan fill="#00D9FF" font-family="'SF Mono',monospace" font-size="12">[2]</tspan>.<tspan fill="#E8652B" font-weight="700">▍</tspan></text>

  <!-- transparency panel (the showcase) -->
  <rect x="474" y="356" width="640" height="170" rx="10" fill="#111111" stroke="#1f2228"/>
  <rect x="474" y="356" width="640" height="32" rx="10" fill="#1A1A1A"/>
  <rect x="474" y="372" width="640" height="16" fill="#1A1A1A"/>
  <text x="490" y="377" fill="#999" font-size="11" letter-spacing="0.5" font-family="'SF Mono',monospace">RETRIEVED CONTEXT · 3 CHUNKS</text>
  <text x="1096" y="377" fill="#666" font-size="11">▾</text>

  <!-- src row 1 -->
  <line x1="474" y1="388" x2="1114" y2="388" stroke="#1f2228"/>
  <text x="490" y="411" fill="#fff" font-size="12.5">Product Manager @ USPACE</text>
  <text x="730" y="411" fill="#666" font-size="10" font-family="'SF Mono',monospace">EXPERIENCE</text>
  <rect x="940" y="404" width="110" height="4" rx="2" fill="#1f2228"/>
  <rect x="940" y="404" width="106" height="4" rx="2" fill="#E8652B"/>
  <text x="1066" y="411" fill="#00D9FF" font-size="11.5" font-family="'SF Mono',monospace">0.96</text>

  <!-- src row 2 -->
  <line x1="474" y1="434" x2="1114" y2="434" stroke="#1f2228"/>
  <text x="490" y="457" fill="#fff" font-size="12.5">USPACE for Business</text>
  <text x="730" y="457" fill="#666" font-size="10" font-family="'SF Mono',monospace">EXPERIENCE</text>
  <rect x="940" y="450" width="110" height="4" rx="2" fill="#1f2228"/>
  <rect x="940" y="450" width="89" height="4" rx="2" fill="#E8652B"/>
  <text x="1066" y="457" fill="#00D9FF" font-size="11.5" font-family="'SF Mono',monospace">0.81</text>

  <!-- src row 3 -->
  <line x1="474" y1="480" x2="1114" y2="480" stroke="#1f2228"/>
  <text x="490" y="503" fill="#fff" font-size="12.5">How I use AI — Prototyping</text>
  <text x="730" y="503" fill="#666" font-size="10" font-family="'SF Mono',monospace">ABOUT</text>
  <rect x="940" y="496" width="110" height="4" rx="2" fill="#1f2228"/>
  <rect x="940" y="496" width="70" height="4" rx="2" fill="#E8652B"/>
  <text x="1066" y="503" fill="#00D9FF" font-size="11.5" font-family="'SF Mono',monospace">0.64</text>

  <!-- composer -->
  <line x1="448" y1="552" x2="1138" y2="552" stroke="#1f2228"/>
  <rect x="474" y="566" width="560" height="24" rx="12" fill="#0A0A0A" stroke="#1f2228"/>
  <text x="486" y="582" fill="#666" font-size="12">Ask anything about his work…</text>
  <rect x="1046" y="564" width="68" height="28" rx="9" fill="#E8652B"/>
  <text x="1062" y="583" fill="#fff" font-size="13" font-weight="600">Send</text>
</svg>
